name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Package dist
        id: package
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          ARCHIVE_BASE="cardano-lightning-app-${VERSION}"
          tar -czf "${ARCHIVE_BASE}.tar.gz" -C dist .
          (cd dist && zip -rq "../${ARCHIVE_BASE}.zip" .)
          echo "tar=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "zip=${ARCHIVE_BASE}.zip"    >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cardano-lightning-app-dist
          path: |
            ${{ steps.package.outputs.tar }}
            ${{ steps.package.outputs.zip }}

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.tar }}
            ${{ steps.package.outputs.zip }}
