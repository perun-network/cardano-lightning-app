<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardano Lightning Bridge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Cardano Lightning Bridge</h1>
    <div id="pool-info" class="pool-bar">
      <span>Pool: loading...</span>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab active" data-tab="onramp">Onramp (BTC &rarr; cBTC)</button>
      <button class="tab" data-tab="offramp">Offramp (cBTC &rarr; BTC)</button>
    </div>

    <!-- Onramp -->
    <section id="onramp" class="panel active">
      <h2>Lightning BTC &rarr; Cardano cBTC</h2>
      <form id="onramp-form">
        <label for="onramp-amount">Amount (cBTC)</label>
        <input type="number" id="onramp-amount" required min="1" placeholder="e.g. 50000">

        <label for="onramp-address">Cardano Address</label>
        <input type="text" id="onramp-address" required placeholder="addr_test1...">

        <button type="submit">Request Onramp</button>
      </form>

      <div id="onramp-result" class="result hidden">
        <h3>Lightning Invoice</h3>
        <div id="onramp-qr" class="qr"></div>
        <textarea id="onramp-bolt11" readonly rows="3"></textarea>
        <button onclick="navigator.clipboard.writeText(document.getElementById('onramp-bolt11').value)">Copy Invoice</button>
        <div id="onramp-status" class="status">Status: <span>--</span></div>
        <div id="onramp-tx" class="tx hidden">Cardano TX: <a href="#" target="_blank"></a></div>
      </div>
    </section>

    <!-- Offramp -->
    <section id="offramp" class="panel hidden">
      <h2>Cardano cBTC &rarr; Lightning BTC</h2>
      <form id="offramp-form">
        <label for="offramp-bolt11">Your Lightning Invoice (BOLT11)</label>
        <input type="text" id="offramp-bolt11" required placeholder="lnbc...">

        <label for="offramp-amount">Amount (cBTC)</label>
        <input type="number" id="offramp-amount" required min="1" placeholder="e.g. 50000">

        <label for="offramp-address">Your Cardano Address</label>
        <input type="text" id="offramp-address" required placeholder="addr_test1...">

        <button type="submit">Request Offramp</button>
      </form>

      <div id="offramp-result" class="result hidden">
        <h3>Send cBTC</h3>
        <p>Send <strong id="offramp-send-amount"></strong> cBTC to:</p>
        <code id="offramp-operator-addr"></code>
        <button onclick="navigator.clipboard.writeText(document.getElementById('offramp-operator-addr').textContent)">Copy Address</button>

        <div id="offramp-deposit-section">
          <label for="offramp-cbtc-tx">cBTC Transfer TX Hash</label>
          <input type="text" id="offramp-cbtc-tx" placeholder="TX hash after sending cBTC">
          <button id="offramp-deposit-btn" onclick="submitOfframpDeposit()">Confirm Deposit</button>
        </div>

        <div id="offramp-status" class="status">Status: <span>--</span></div>
        <div id="offramp-tx" class="tx hidden">FulfillOfframp TX: <a href="#" target="_blank"></a></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
